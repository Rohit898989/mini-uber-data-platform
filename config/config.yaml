# Mini Uber Data Platform Configuration

pipeline:
  # Batch size for processing records at a time
  batch_size: 1000
  
  # Timeout for pipeline execution in seconds
  timeout: 300
  
  # Number of retry attempts on failure
  retry_attempts: 3
  
  # Enable or disable caching
  enable_cache: true

database:
  # Database type: mysql, postgresql, sqlite
  type: mysql
  
  # Connection settings
  host: localhost
  port: 3306
  user: root
  password: your_password_here
  database: uber_data_platform
  
  # Connection pool settings
  pool_size: 10
  max_overflow: 20
  pool_timeout: 30
  pool_recycle: 3600
  
  # Query settings
  read_timeout: 30
  write_timeout: 30
  
  # SSL Connection (optional)
  use_ssl: false
  ssl_ca: null
  ssl_cert: null
  ssl_key: null

logging:
  # Log level: DEBUG, INFO, WARNING, ERROR, CRITICAL
  level: INFO
  
  # Log format
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  
  # File location
  file_path: logs/etl_pipeline.log
  
  # File rotation settings
  max_bytes: 10485760  # 10MB
  backup_count: 5
  
  # Console output
  console_enabled: true
  console_level: INFO

data:
  # Input data settings
  input:
    path: data/trips.csv
    format: csv
    encoding: utf-8
    delimiter: ','
  
  # Output data settings
  output:
    path: data/trips_cleaned.csv
    format: csv
    encoding: utf-8
    delimiter: ','
  
  # Data validation settings
  validation:
    remove_duplicates: true
    remove_null_rows: true
    validate_data_types: true

performance:
  # Enable query optimization
  optimize_queries: true
  
  # Use indexes for faster lookups
  use_indexes: true
  
  # Cache query results
  cache_results: true
  cache_ttl: 3600  # seconds
  
  # Parallel processing (number of workers)
  workers: 4
  chunk_size: 1000

monitoring:
  # Enable monitoring and metrics
  enabled: true
  
  # Metrics collection interval (seconds)
  interval: 60
  
  # Alert thresholds
  alerts:
    pipeline_duration_threshold: 300  # seconds
    error_rate_threshold: 0.05  # 5%
    data_quality_threshold: 0.95  # 95% quality
